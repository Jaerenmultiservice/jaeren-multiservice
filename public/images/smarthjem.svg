<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Smart Hjem & Teknisk Hjelp">
  <defs>
    <linearGradient id="bg4" x1="0" x2="1">
      <stop offset="0" stop-color="#081018"/>
      <stop offset="1" stop-color="#0d1220"/>
    </linearGradient>
    <linearGradient id="acc4" x1="0" x2="1">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#ffd27a"/>
    </linearGradient>
    <style>
      .title{font-family:'Saira Condensed', Arial, sans-serif; font-size:36px; fill:#fff; font-weight:700}
      .subtitle{font-family:Arial, sans-serif; font-size:18px; fill:#cbd5e1}
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg4)"/>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#acc4)" opacity="0.03"/>

  <!-- Smart home icon (signal + house) -->
  <g transform="translate(360,180) scale(1.3)">
    <rect x="0" y="160" width="420" height="200" rx="12" fill="#071017" stroke="url(#acc4)" stroke-width="6"/>
    <path d="M80 160 L210 60 L340 160" fill="#071017" stroke="#9be7ff" stroke-width="6"/>
    <circle cx="320" cy="300" r="10" fill="#9be7ff"/>
    <path d="M320 300 C335 285 360 260 410 260" stroke="#9be7ff" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>

  <g transform="translate(80,680)">
    <text class="title">Smart Hjem & Teknisk Hjelp</text>
    <text x="0" y="30" class="subtitle">Smarthus · Nettverk · Feilsřking</text>
  </g>
</svg>

