<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Hagearbeid">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="1" stop-color="#0f1720"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" x2="1">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#ffd27a"/>
    </linearGradient>
    <style>
      .title{font-family:'Saira Condensed', Arial, sans-serif; font-size:36px; fill:#fff; font-weight:700}
      .subtitle{font-family:Arial, sans-serif; font-size:18px; fill:#cbd5e1}
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg2)"/>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#acc2)" opacity="0.03"/>

  <!-- Garden scene: hedge and spade -->
  <g transform="translate(220,200)" fill="none" stroke="#9ae6b4" stroke-width="10">
    <rect x="0" y="160" width="420" height="160" rx="20" fill="#072218" stroke="url(#acc2)" stroke-width="4"/>
    <path d="M460 60 C480 20 540 10 560 60 L560 220" stroke="#b7f5c9" stroke-width="14" fill="none"/>
    <rect x="520" y="220" width="28" height="120" fill="#6b8f6a"/>
  </g>

  <g transform="translate(80,680)">
    <text class="title">Hagearbeid</text>
    <text x="0" y="30" class="subtitle">Hekkeklipp · Plenklipp · Hagevedlikehold</text>
  </g>
</svg>

