<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Gravearbeid">
  <defs>
    <linearGradient id="bg3" x1="0" x2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#0f1112"/>
    </linearGradient>
    <linearGradient id="acc3" x1="0" x2="1">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#ffd27a"/>
    </linearGradient>
    <style>
      .title{font-family:'Saira Condensed', Arial, sans-serif; font-size:36px; fill:#fff; font-weight:700}
      .subtitle{font-family:Arial, sans-serif; font-size:18px; fill:#d1d5db}
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg3)"/>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#acc3)" opacity="0.04"/>

  <!-- Excavator silhouette -->
  <g transform="translate(200,180) scale(1.3)" fill="#0b0f12" stroke="url(#acc3)" stroke-width="6">
    <rect x="0" y="200" width="400" height="120" rx="12" fill="#0f1416"/>
    <path d="M360 200 L520 120 L560 150 L420 240 Z" fill="#0b0f12"/>
    <circle cx="80" cy="340" r="40" fill="#081014"/>
  </g>

  <g transform="translate(80,680)">
    <text class="title">Gravearbeid</text>
    <text x="0" y="30" class="subtitle">Graving · Drenering · Oppkjřrsel</text>
  </g>
</svg>

