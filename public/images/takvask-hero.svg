<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Takvask placeholder">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="50%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0b0b0b"/>
    </linearGradient>
    <radialGradient id="accent" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff7a00" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#accent)"/>

  <!-- Subtle texture -->
  <rect width="100%" height="100%" fill="#000" opacity="0.04" filter="url(#grain)"/>

  <!-- Stylized roof icon -->
  <g transform="translate(800,360) scale(1.0)">
    <polygon points="-360,120 0,-200 360,120" fill="#0f1720" stroke="#1f2937" stroke-width="6" opacity="0.9"/>
    <polygon points="-300,80 0,-160 300,80" fill="#121318" stroke="#ff7a00" stroke-width="6" opacity="0.9"/>
    <!-- Brush / water arcs (suggest cleaning) -->
    <g transform="translate(-40,40) scale(1.0)">
      <path d="M -220 40 C -180 -10 -120 -10 -80 10" stroke="#cbd5e1" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <path d="M -180 60 C -130 10 -70 10 -30 30" stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>

  <!-- Bottom gradient fade -->
  <rect x="0" y="600" width="1600" height="400" fill="linearGradient(0,0,0,1)" opacity="0.4"/>

  <!-- Title watermark -->
  <text x="80" y="820" fill="#9ca3af" font-family="Saira Condensed, Arial, sans-serif" font-size="28" letter-spacing="2">TAKVASK  Jæren Multiservice</text>

</svg>
