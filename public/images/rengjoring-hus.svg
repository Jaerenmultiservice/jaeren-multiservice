<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Rengjřring av hus">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ff7a00"/>
      <stop offset="1" stop-color="#ffd27a"/>
    </linearGradient>
    <style>
      .title{font-family:'Saira Condensed', Arial, sans-serif; font-size:36px; fill:#fff; font-weight:700}
      .subtitle{font-family:Arial, sans-serif; font-size:18px; fill:#d1d5db}
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#accent)" opacity="0.03"/>

  <!-- House silhouette -->
  <g transform="translate(380,180) scale(1.2)" fill="none" stroke="#cbd5e1" stroke-width="10" stroke-linejoin="round">
    <path d="M80 200 L200 80 L320 200 L320 360 L80 360 Z" fill="#0f1720" stroke="url(#accent)" stroke-width="6"/>
    <rect x="150" y="240" width="80" height="120" fill="#091018" stroke="#0e1012"/>
    <rect x="100" y="260" width="30" height="30" fill="#0b1220"/>
  </g>

  <!-- Cleaning swoosh -->
  <g transform="translate(720,200)">
    <path d="M0 200 C100 120 220 120 320 200" stroke="#9be7ff" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9"/>
    <circle cx="320" cy="200" r="12" fill="#9be7ff"/>
  </g>

  <g transform="translate(80,680)">
    <text class="title">Rengjřring av hus</text>
    <text x="0" y="30" class="subtitle">Takvask · Fasadevask · Takrennerens</text>
  </g>
</svg>

